<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Security Gateway</title>
<style>
/* ── Reset & theme ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #1c2128;
  --border:    #30363d;
  --text:      #c9d1d9;
  --dim:       #6e7681;
  --accent:    #58a6ff;
  --green:     #3fb950;
  --yellow:    #d29922;
  --red:       #f85149;
  --mono:      "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  --r:         6px;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Scrollbars ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar       { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Header ─────────────────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; gap: 10px;
  height: 48px; padding: 0 16px; flex-shrink: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; }
.logo-icon { font-size: 17px; }
.header-spacer { flex: 1; }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 9px; border-radius: 12px;
  font-size: 11px; font-weight: 600; letter-spacing: .4px;
}
.b-unauth { background: rgba(110,118,129,.15); color: var(--dim);   border: 1px solid rgba(110,118,129,.3); }
.b-admin  { background: rgba(88,166,255,.12);  color: var(--accent); border: 1px solid rgba(88,166,255,.3); }
.b-viewer { background: rgba(63,185,80,.1);    color: var(--green);  border: 1px solid rgba(63,185,80,.3); }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
button {
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text);
  border-radius: var(--r); padding: 5px 12px; font-size: 13px;
  transition: background .12s, border-color .12s;
}
button:hover   { background: #2d333b; border-color: var(--dim); }
button:active  { background: #373e47; }
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
button.primary:hover { background: #79b8ff; border-color: #79b8ff; }
button.danger  { color: var(--red);   border-color: rgba(248,81,73,.3); }
button.danger:hover  { background: rgba(248,81,73,.1); border-color: var(--red); }
button.ok      { color: var(--green); border-color: rgba(63,185,80,.3); }
button.ok:hover      { background: rgba(63,185,80,.1); border-color: var(--green); }
button:disabled { opacity: .45; cursor: not-allowed; }
.hidden { display: none !important; }

/* ── Layout ──────────────────────────────────────────────────────────────── */
.layout {
  display: flex; flex: 1; overflow: hidden;
  /* leaves room for the 200px activity panel */
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar {
  width: 210px; min-width: 210px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px 8px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .9px; color: var(--dim);
  border-bottom: 1px solid var(--border);
}
.sidebar-hdr .cnt { color: var(--accent); font-size: 12px; font-weight: 600; }
#file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.file-item {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 12px; cursor: pointer; font-size: 13px;
  border-left: 2px solid transparent;
  transition: background .1s;
}
.file-item:hover { background: var(--surface2); }
.file-item.active { background: rgba(88,166,255,.1); border-left-color: var(--accent); }
.file-item.masked { cursor: default; color: var(--dim); font-family: var(--mono); font-size: 11px; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.d-ok  { background: var(--green); }
.d-bad { background: var(--red); }
.d-new { background: var(--yellow); }
.d-unk { background: var(--dim); }
.fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-btns {
  padding: 8px 10px; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.sidebar-btns button { font-size: 12px; padding: 5px 8px; }
.btn-row { display: flex; gap: 6px; }
.btn-row button { flex: 1; }

/* ── Main panel ──────────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; min-height: 44px; flex-shrink: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
#main-fname { flex: 1; font-family: var(--mono); font-size: 14px; font-weight: 600; }
.ibadge {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; letter-spacing: .4px;
}
.ib-ok  { background: rgba(63,185,80,.12);  color: var(--green);  border: 1px solid rgba(63,185,80,.3); }
.ib-bad { background: rgba(248,81,73,.12);  color: var(--red);    border: 1px solid rgba(248,81,73,.3); }
.ib-new { background: rgba(210,153,34,.1);  color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }
.main-body { flex: 1; overflow: auto; padding: 16px; }
#file-pre {
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  white-space: pre; color: var(--text);
}
textarea.editor {
  width: 100%; height: 100%; min-height: 260px;
  font-family: var(--mono); font-size: 13px; line-height: 1.6;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 12px; outline: none; resize: vertical;
}
textarea.editor:focus { border-color: var(--accent); }

/* empty / locked state */
.empty {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--dim); text-align: center;
}
.empty .icon  { font-size: 38px; }
.empty p      { font-size: 13px; max-width: 300px; }
.enc-note {
  font-family: var(--mono); font-size: 11px; color: var(--yellow);
  background: rgba(210,153,34,.08); border: 1px solid rgba(210,153,34,.2);
  border-radius: var(--r); padding: 7px 14px; max-width: 400px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* add-file form */
.add-form { max-width: 580px; }
.add-form label {
  display: block; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px;
  color: var(--dim); margin: 0 0 5px;
}
.add-form input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--r); padding: 7px 10px;
  font-family: var(--mono); font-size: 13px; outline: none; margin-bottom: 12px;
}
.add-form input:focus { border-color: var(--accent); }
.add-form textarea {
  width: 100%; min-height: 180px;
  font-family: var(--mono); font-size: 13px; line-height: 1.6;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px; outline: none; resize: vertical; margin-bottom: 12px;
}
.add-form textarea:focus { border-color: var(--accent); }
.form-btns { display: flex; gap: 8px; }

/* ── Activity log ────────────────────────────────────────────────────────── */
.activity {
  height: 200px; min-height: 200px; flex-shrink: 0;
  border-top: 1px solid var(--border); background: var(--surface);
  display: flex; flex-direction: column;
}
.activity-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.activity-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .9px; color: var(--dim); flex: 1;
}
#log {
  flex: 1; overflow-y: auto;
  font-family: var(--mono); font-size: 11.5px; padding: 2px 0;
}
.le {
  display: flex; align-items: baseline; gap: 8px;
  padding: 2.5px 16px; transition: background .1s;
}
.le:hover     { background: var(--surface2); }
.lt           { color: var(--dim); flex-shrink: 0; width: 56px; }
.lu           { color: var(--accent); flex-shrink: 0; width: 68px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.la           { color: var(--text); flex-shrink: 0; width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lr           { color: var(--dim); flex-shrink: 0; width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lo           { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lo.ok        { color: var(--green); }
.lo.bad       { color: var(--red);    font-weight: 700; }
.lo.warn      { color: var(--yellow); }
.lo.err       { color: var(--red); }
.lo.muted     { color: var(--dim); }
.unauth-tag   { color: var(--yellow); font-size: 10px; margin-right: 3px; }
.log-locked   {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--dim); gap: 8px; font-size: 12px;
}

/* ── Login modal ─────────────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.72);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 26px; width: 320px;
  box-shadow: 0 20px 60px rgba(0,0,0,.55);
}
.modal h2 { font-size: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.modal label {
  display: block; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px;
  color: var(--dim); margin: 12px 0 5px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--r); padding: 8px 10px;
  font-size: 14px; outline: none;
}
.modal input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.modal-btns button { flex: 1; padding: 8px; }
.merr { color: var(--red); font-size: 12px; margin-top: 7px; min-height: 14px; }

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toasts {
  position: fixed; bottom: 18px; right: 18px;
  display: flex; flex-direction: column; gap: 7px;
  z-index: 200; pointer-events: none;
}
.toast {
  padding: 9px 15px; border-radius: var(--r);
  font-size: 13px; border: 1px solid;
  animation: tin .18s ease; pointer-events: auto;
}
.toast.ok   { background: rgba(63,185,80,.14);  border-color: rgba(63,185,80,.4);  color: var(--green); }
.toast.err  { background: rgba(248,81,73,.14);  border-color: rgba(248,81,73,.4);  color: var(--red); }
.toast.info { background: rgba(88,166,255,.1);  border-color: rgba(88,166,255,.3); color: var(--accent); }
.toast.warn { background: rgba(210,153,34,.1);  border-color: rgba(210,153,34,.3); color: var(--yellow); }
@keyframes tin { from { transform: translateX(14px); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="logo"><span class="logo-icon">🔒</span> MCP Security Gateway</div>
  <div class="header-spacer"></div>
  <span id="auth-badge" class="badge b-unauth">⚪ Not authenticated</span>
  <button id="btn-login"  onclick="showLogin()">Login</button>
  <button id="btn-logout" class="hidden danger" onclick="doLogout()">Logout</button>
</header>

<!-- ── Body ────────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-hdr">
      File Store <span class="cnt" id="file-count">—</span>
    </div>
    <div id="file-list"></div>
    <div id="sidebar-btns" class="sidebar-btns hidden">
      <button class="ok" onclick="showAddForm()">＋ Add File</button>
      <div class="btn-row">
        <button onclick="doScan()" title="Scan all files for tampering">⚡ Scan</button>
        <button id="btn-reset" class="hidden danger" onclick="doReset()" title="Restore all files to original">↺ Reset All</button>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div class="main-hdr">
      <span id="main-fname">—</span>
      <span id="main-ibadge"></span>
      <div id="view-btns" class="hidden" style="display:flex;gap:6px">
        <button onclick="doCheckIntegrity()" title="Re-check SHA-256 against original">🔍 Check</button>
        <button id="btn-repair" class="hidden ok" onclick="doRepair()" title="Restore to original content">↺ Repair</button>
        <button onclick="startEdit()">✏️ Edit</button>
        <button class="danger" onclick="doDelete()">🗑 Delete</button>
      </div>
      <div id="edit-btns" class="hidden" style="display:flex;gap:6px">
        <button class="primary" onclick="saveEdit()">💾 Save</button>
        <button onclick="cancelEdit()">Cancel</button>
      </div>
    </div>
    <div class="main-body" id="main-body">
      <div class="empty" id="empty-state">
        <div class="icon">📂</div>
        <p>Select a file from the sidebar, or log in to access protected content.</p>
        <div class="enc-note hidden" id="enc-hint">
          AES-256-CBC encrypted — authenticate to decrypt
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ── Activity log ─────────────────────────────────────────────────────── -->
<div class="activity">
  <div class="activity-hdr">
    <span class="activity-title">Activity Log</span>
    <button id="btn-refresh-log" class="hidden" onclick="loadActivity()" title="Refresh activity log">↻</button>
  </div>
  <div id="log">
    <div class="log-locked">Log in to view the activity log</div>
  </div>
</div>

<!-- ── Login modal ──────────────────────────────────────────────────────── -->
<div class="overlay hidden" id="login-modal">
  <div class="modal">
    <h2>Authenticate</h2>
    <label>Username</label>
    <input id="lu" type="text" placeholder="admin" autocomplete="username">
    <label>Password</label>
    <input id="lp" type="password" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div class="merr" id="lerr"></div>
    <div class="modal-btns">
      <button class="primary" onclick="doLogin()">Login</button>
      <button onclick="hideLogin()">Cancel</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const S = { token: null, user: null, role: null, file: null };

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const h = { 'Content-Type': 'application/json' };
  if (S.token) h['x-session-token'] = S.token;
  const r = await fetch(path, {
    method,
    headers: h,
    body: body != null ? JSON.stringify(body) : undefined,
  });
  return r.json();
}

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3400);
}

// ── Auth ───────────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-modal').classList.remove('hidden');
  document.getElementById('lu').focus();
}
function hideLogin() {
  document.getElementById('login-modal').classList.add('hidden');
  document.getElementById('lerr').textContent = '';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
}

async function doLogin() {
  const username = document.getElementById('lu').value.trim();
  const password = document.getElementById('lp').value;
  if (!username || !password) return;
  const d = await api('POST', '/api/auth/login', { username, password });
  if (d.status === 'success') {
    S.token = d.session_token; S.user = d.username; S.role = d.role;
    hideLogin(); updateAuthUI(); loadFiles(); loadActivity();
    toast(`Logged in as ${username}`, 'ok');
  } else {
    document.getElementById('lerr').textContent = d.message;
  }
}

async function doLogout() {
  await api('POST', '/api/auth/logout');
  S.token = S.user = S.role = S.file = null;
  updateAuthUI(); loadFiles(); showEmpty(false);
  document.getElementById('log').innerHTML = '<div class="log-locked">Log in to view the activity log</div>';
  toast('Logged out', 'info');
}

function updateAuthUI() {
  const badge    = document.getElementById('auth-badge');
  const btnLogin = document.getElementById('btn-login');
  const btnLogout= document.getElementById('btn-logout');
  const sbtns    = document.getElementById('sidebar-btns');
  const btnReset = document.getElementById('btn-reset');
  const btnRefLog= document.getElementById('btn-refresh-log');

  if (S.token) {
    const cls = S.role === 'admin' ? 'b-admin' : 'b-viewer';
    badge.className = `badge ${cls}`;
    badge.textContent = `● ${S.user} (${S.role})`;
    btnLogin.classList.add('hidden');
    btnLogout.classList.remove('hidden');
    sbtns.classList.remove('hidden');
    btnRefLog.classList.remove('hidden');
    if (S.role === 'admin') btnReset.classList.remove('hidden');
    else btnReset.classList.add('hidden');
  } else {
    badge.className = 'badge b-unauth';
    badge.textContent = '⚪ Not authenticated';
    btnLogin.classList.remove('hidden');
    btnLogout.classList.add('hidden');
    sbtns.classList.add('hidden');
    btnRefLog.classList.add('hidden');
  }
}

// ── File list ──────────────────────────────────────────────────────────────
async function loadFiles() {
  const d = await api('GET', '/api/files');
  document.getElementById('file-count').textContent = d.count;
  const list = document.getElementById('file-list');
  list.innerHTML = '';

  if (!d.files || d.files.length === 0) {
    list.innerHTML = '<div style="padding:12px;color:var(--dim);font-size:12px;">No files</div>';
    return;
  }

  d.files.forEach(f => {
    const item = document.createElement('div');
    if (f.masked) {
      item.className = 'file-item masked';
      item.innerHTML = `<span class="dot d-unk"></span><span class="fname">████████████</span>`;
    } else {
      const dc = f.intact === true ? 'd-ok' : f.intact === false ? 'd-bad' : 'd-new';
      item.className = 'file-item' + (S.file === f.name ? ' active' : '');
      item.innerHTML = `<span class="dot ${dc}"></span><span class="fname">${esc(f.name)}</span>`;
      item.onclick = () => openFile(f.name);
    }
    list.appendChild(item);
  });

  // If the currently-open file was deleted, show empty state
  if (S.file && !d.files.find(f => f.name === S.file)) {
    S.file = null; showEmpty(false);
  }
}

// ── File viewer ────────────────────────────────────────────────────────────
async function openFile(name) {
  S.file = name;
  // Highlight in sidebar
  document.querySelectorAll('.file-item:not(.masked)').forEach(el => {
    const fn = el.querySelector('.fname');
    el.classList.toggle('active', fn && fn.textContent === name);
  });

  const d = await api('GET', `/api/files/${encodeURIComponent(name)}`);

  const fname  = document.getElementById('main-fname');
  const ibadge = document.getElementById('main-ibadge');
  const vbtns  = document.getElementById('view-btns');
  const ebtns  = document.getElementById('edit-btns');
  const body   = document.getElementById('main-body');
  const bRepair= document.getElementById('btn-repair');

  ebtns.classList.add('hidden');

  if (!d.authenticated) {
    fname.textContent = '████████████';
    ibadge.innerHTML = '';
    vbtns.classList.add('hidden');
    body.innerHTML = `
      <div class="empty">
        <div class="icon">🔒</div>
        <p>This file is AES-256-CBC encrypted.</p>
        <div class="enc-note">${esc(d.content ? d.content.substring(0, 72) + '…' : '')}</div>
        <p style="font-size:12px;color:var(--dim)">Log in to decrypt and read this file.</p>
      </div>`;
    return;
  }

  fname.textContent = name;
  // Integrity badge
  if (d.intact === true) {
    ibadge.innerHTML = '<span class="ibadge ib-ok">✓ intact</span>';
    bRepair.classList.add('hidden');
  } else if (d.intact === false) {
    ibadge.innerHTML = '<span class="ibadge ib-bad">⚠ TAMPERED</span>';
    if (S.role === 'admin') bRepair.classList.remove('hidden');
  } else {
    ibadge.innerHTML = '<span class="ibadge ib-new">◎ new file</span>';
    bRepair.classList.add('hidden');
  }

  vbtns.style.display = '';
  vbtns.classList.remove('hidden');
  body.innerHTML = `<pre id="file-pre"></pre>`;
  document.getElementById('file-pre').textContent = d.content;
  loadActivity();
}

function showEmpty(showEnc = false) {
  const body = document.getElementById('main-body');
  body.innerHTML = `
    <div class="empty" id="empty-state">
      <div class="icon">📂</div>
      <p>Select a file from the sidebar to view its contents.</p>
      ${showEnc ? '<div class="enc-note">AES-256-CBC encrypted — authenticate to decrypt</div>' : ''}
    </div>`;
  document.getElementById('main-fname').textContent = '—';
  document.getElementById('main-ibadge').innerHTML = '';
  document.getElementById('view-btns').classList.add('hidden');
  document.getElementById('edit-btns').classList.add('hidden');
}

// ── Edit ───────────────────────────────────────────────────────────────────
function startEdit() {
  const pre = document.getElementById('file-pre');
  if (!pre) return;
  const text = pre.textContent;
  document.getElementById('main-body').innerHTML =
    `<textarea class="editor" id="editor" spellcheck="false"></textarea>`;
  document.getElementById('editor').value = text;
  document.getElementById('editor').focus();
  document.getElementById('view-btns').classList.add('hidden');
  document.getElementById('edit-btns').classList.remove('hidden');
}

function cancelEdit() {
  document.getElementById('edit-btns').classList.add('hidden');
  if (S.file) openFile(S.file);
}

async function saveEdit() {
  const ed = document.getElementById('editor');
  if (!ed || !S.file) return;
  const d = await api('PUT', `/api/files/${encodeURIComponent(S.file)}`, { content: ed.value });
  if (d.status === 'success') {
    toast(`'${S.file}' saved`, 'ok');
    document.getElementById('edit-btns').classList.add('hidden');
    openFile(S.file); loadFiles();
  } else { toast(d.message, 'err'); }
}

// ── Add file ───────────────────────────────────────────────────────────────
function showAddForm() {
  S.file = null;
  document.getElementById('main-fname').textContent = 'New File';
  document.getElementById('main-ibadge').innerHTML = '';
  document.getElementById('view-btns').classList.add('hidden');
  document.getElementById('edit-btns').classList.add('hidden');
  document.getElementById('main-body').innerHTML = `
    <div class="add-form">
      <label>Filename</label>
      <input id="nf-name" type="text" placeholder="e.g. notes.txt">
      <label>Content</label>
      <textarea id="nf-body" placeholder="Enter file content…" spellcheck="false"></textarea>
      <div class="form-btns">
        <button class="primary" onclick="doCreate()">Create File</button>
        <button onclick="showEmpty(false)">Cancel</button>
      </div>
    </div>`;
  document.getElementById('nf-name').focus();
}

async function doCreate() {
  const name = (document.getElementById('nf-name').value || '').trim();
  const content = document.getElementById('nf-body').value;
  if (!name) { toast('Filename is required', 'err'); return; }
  const d = await api('PUT', `/api/files/${encodeURIComponent(name)}`, { content });
  if (d.status === 'success') {
    toast(`'${name}' created`, 'ok');
    S.file = name; loadFiles(); openFile(name);
  } else { toast(d.message, 'err'); }
}

// ── Delete ─────────────────────────────────────────────────────────────────
async function doDelete() {
  if (!S.file) return;
  if (!confirm(`Delete '${S.file}'?\nUse Repair or Reset All to restore it.`)) return;
  const d = await api('DELETE', `/api/files/${encodeURIComponent(S.file)}`);
  if (d.status === 'success') {
    toast(d.message, 'info');
    S.file = null; loadFiles(); showEmpty(false); loadActivity();
  } else { toast(d.message, 'err'); }
}

// ── Integrity ──────────────────────────────────────────────────────────────
async function doCheckIntegrity() {
  if (!S.file) return;
  const d = await api('GET', `/api/files/${encodeURIComponent(S.file)}/integrity`);
  if (d.status === 'error') { toast(d.message, 'err'); return; }
  if (d.verdict === 'intact') toast(`✓ ${S.file} is intact`, 'ok');
  else if (d.verdict === 'TAMPERED') toast(`⚠ TAMPERED: ${S.file}`, 'warn');
  else toast(`${S.file}: ${d.verdict}`, 'info');
  openFile(S.file); loadFiles(); loadActivity();
}

async function doRepair() {
  if (!S.file) return;
  const d = await api('POST', `/api/files/${encodeURIComponent(S.file)}/repair`);
  if (d.status === 'success') { toast(d.message, 'ok'); openFile(S.file); loadFiles(); loadActivity(); }
  else toast(d.message, 'err');
}

async function doScan() {
  const d = await api('GET', '/api/scan');
  if (d.status === 'error') { toast(d.message, 'err'); return; }
  if (d.count === 0) toast('All files are intact', 'ok');
  else toast(`⚠ ${d.count} tampered: ${d.tampered_files.join(', ')}`, 'warn');
  loadFiles(); loadActivity();
}

async function doReset() {
  if (!confirm('Restore ALL files to original content? This overwrites any changes.')) return;
  const d = await api('POST', '/api/reset');
  if (d.status === 'success') {
    toast(`All ${d.count} files restored`, 'ok');
    if (S.file) openFile(S.file); loadFiles(); loadActivity();
  } else toast(d.message, 'err');
}

// ── Activity log ───────────────────────────────────────────────────────────
async function loadActivity() {
  if (!S.token) return;
  const d = await api('GET', '/api/activity');
  if (d.status !== 'success') return;
  const log = document.getElementById('log');
  if (!d.entries || d.entries.length === 0) {
    log.innerHTML = '<div style="padding:10px 16px;color:var(--dim);font-size:12px;">No activity yet</div>';
    return;
  }
  log.innerHTML = d.entries.slice(0, 120).map(e => {
    const time = e.timestamp.substring(11, 19);
    const user = (e.username || '').substring(0, 11);
    const action = (e.action || '').substring(0, 18);
    const res = (e.resource || '').substring(0, 22);
    const out = e.outcome || '';
    let oc = 'muted';
    if (/^success/.test(out) || out === 'intact' || out === 'restored') oc = 'ok';
    else if (/TAMPERED/.test(out)) oc = 'bad';
    else if (/denied|DENIED|invalid/.test(out)) oc = 'warn';
    else if (/error/.test(out)) oc = 'err';
    else if (/written|deleted|restored|revoked/.test(out)) oc = 'ok';
    const utag = e.authenticated ? '' : '<span class="unauth-tag">[UNAUTH]</span>';
    return `<div class="le">
      <span class="lt">${time}</span>
      <span class="lu">${esc(user)}</span>
      <span class="la">${esc(action)}</span>
      <span class="lr">${esc(res)}</span>
      <span class="lo ${oc}">${utag}${esc(out)}</span>
    </div>`;
  }).join('');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
loadFiles();
showEmpty(true);
updateAuthUI();
</script>
</body>
</html>
